<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Products — AmalGus Glass Marketplace</title>
<meta name="description" content="Browse 40+ verified glass products from trusted Indian suppliers. Tempered, laminated, insulated, decorative glass and hardware."/>

<!-- Fonts: Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- Lucide icons -->
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
:root {
  --ink:       #111210;
  --ink-2:     #383633;
  --ink-3:     #6b6864;
  --ink-4:     #a4a19d;
  --bg:        #f9f8f5;
  --bg-2:      #f1efe9;
  --bg-3:      #e7e4dc;
  --white:     #ffffff;
  --blue:      #1c52c4;
  --blue-dark: #163fa8;
  --blue-lt:   #edf2fd;
  --blue-bd:   #bad0f9;
  --green:     #15683a;
  --green-lt:  #edfaf3;
  --green-bd:  #8adcb0;
  --amber:     #8f5e10;
  --amber-lt:  #fdf8ec;
  --amber-bd:  #f2d07a;
  --bd:        rgba(17,18,16,.07);
  --bd-2:      rgba(17,18,16,.13);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,.07);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.11);
  --font:      'Inter', system-ui, -apple-system, sans-serif;
  --ease:      cubic-bezier(.4,0,.2,1);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 22px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  line-height: 1.5;
}
button { cursor: pointer; font-family: var(--font); }

/* ── NAV ── */
.nav {
  height: 56px;
  background: rgba(249,248,245,.88);
  backdrop-filter: blur(18px) saturate(1.6);
  border-bottom: 1px solid var(--bd);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 28px; gap: 14px;
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logomark {
  width: 30px; height: 30px;
  background: var(--ink);
  border-radius: 7px;
  display: grid; place-items: center;
}
.nav-logomark svg { width: 16px; height: 16px; stroke: white; stroke-width: 2.2; }
.nav-brand { font-size: 18px; font-weight: 600; letter-spacing: -.2px; color: var(--ink); }
.nav-brand em { color: var(--blue); font-style: normal; font-weight: 700; }
.nav-divider { width: 1px; height: 16px; background: var(--bd-2); }
.nav-tag { font-size: 12px; color: var(--ink-3); font-weight: 400; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.nav-link {
  font-size: 13px; font-weight: 500; color: var(--ink-3);
  text-decoration: none; padding: 7px 12px;
  border-radius: var(--r-sm); transition: color .15s, background .15s;
  display: flex; align-items: center; gap: 6px;
}
.nav-link:hover { color: var(--ink); background: var(--bg-2); }
.nav-link.active { color: var(--blue); background: var(--blue-lt); }
.nav-link svg { width: 15px; height: 15px; }

/* ── PAGE HEADER ── */
.page-header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px 0;
}
.page-header h1 {
  font-size: 28px; font-weight: 700;
  letter-spacing: -.5px; margin-bottom: 6px;
}
.page-header p {
  font-size: 15px; color: var(--ink-3);
  font-weight: 400; margin-bottom: 24px;
}

/* ── FILTERS BAR ── */
.filters-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 20px;
  display: flex; gap: 10px; flex-wrap: wrap;
  align-items: center;
}
.filter-group {
  display: flex; align-items: center; gap: 6px;
  background: var(--white);
  border: 1px solid var(--bd-2);
  border-radius: var(--r-md);
  padding: 8px 14px;
}
.filter-group svg { width: 14px; height: 14px; stroke: var(--ink-3); flex-shrink: 0; }
.filter-group select {
  border: none; background: transparent;
  font-size: 13px; font-family: var(--font);
  color: var(--ink); font-weight: 500;
  outline: none; cursor: pointer;
  -webkit-appearance: none;
}
.filter-group input {
  border: none; background: transparent;
  font-size: 13px; font-family: var(--font);
  color: var(--ink); font-weight: 400;
  outline: none; width: 160px;
}
.filter-group input::placeholder { color: var(--ink-4); }

.result-count {
  margin-left: auto;
  font-size: 13px; color: var(--ink-3); font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}
.result-count svg { width: 14px; height: 14px; }

/* ── GRID ── */
.products-grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ── PRODUCT CARD ── */
.p-card {
  background: var(--white);
  border: 1px solid var(--bd);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all .2s var(--ease);
  display: flex;
  flex-direction: column;
}
.p-card:hover {
  border-color: var(--bd-2);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.p-card-header {
  padding: 20px 20px 0;
  display: flex; justify-content: space-between;
  align-items: flex-start;
}
.p-card-cat {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  color: var(--blue);
  text-transform: uppercase; letter-spacing: .5px;
}
.p-card-cat svg { width: 12px; height: 12px; }

.p-card-price {
  font-size: 16px; font-weight: 700; letter-spacing: -.3px;
  text-align: right;
}
.p-card-price-unit {
  font-size: 11px; color: var(--ink-3); font-weight: 400;
  display: block;
}

.p-card-body { padding: 8px 20px 0; flex: 1; }
.p-card-name {
  font-size: 16px; font-weight: 600;
  letter-spacing: -.1px; line-height: 1.3;
  margin-bottom: 6px;
}
.p-card-supplier {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--ink-3); font-weight: 400;
  margin-bottom: 10px;
}
.p-card-supplier svg { width: 12px; height: 12px; flex-shrink: 0; }

.p-card-desc {
  font-size: 13px; color: var(--ink-3);
  line-height: 1.65; font-weight: 400;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.p-card-chips {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 14px;
}
.p-chip {
  display: flex; align-items: center; gap: 3px;
  background: var(--bg-2); border: 1px solid var(--bd);
  border-radius: 5px; padding: 2px 7px;
  font-size: 11px; color: var(--ink-3); font-weight: 400;
}
.p-chip svg { width: 10px; height: 10px; }

.p-card-footer {
  border-top: 1px solid var(--bd);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.p-card-meta {
  display: flex; gap: 14px;
}
.p-meta-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--ink-4); font-weight: 400;
}
.p-meta-item svg { width: 11px; height: 11px; }

.btn-view {
  display: flex; align-items: center; gap: 5px;
  background: var(--blue); color: white; border: none;
  border-radius: var(--r-sm); padding: 7px 14px;
  font-size: 12px; font-weight: 600;
  transition: background .15s;
}
.btn-view svg { width: 13px; height: 13px; }
.btn-view:hover { background: var(--blue-dark); }

/* ── EMPTY ── */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
}
.no-results svg { width: 40px; height: 40px; stroke: var(--ink-4); margin-bottom: 14px; }
.no-results h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.no-results p { font-size: 14px; color: var(--ink-3); }

/* ── FOOTER ── */
.footer {
  border-top: 1px solid var(--bd);
  padding: 22px; text-align: center;
  background: var(--white);
}
.footer-inner {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; flex-wrap: wrap;
}
.footer-text { font-size: 13px; color: var(--ink-3); font-weight: 400; }
.footer-text strong { color: var(--ink-2); font-weight: 600; }
.footer-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--bd-2); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .nav { padding: 0 14px; }
  .nav-tag, .nav-divider { display: none; }
  .page-header { padding: 24px 16px 0; }
  .page-header h1 { font-size: 22px; }
  .filters-bar { padding: 0 16px 16px; }
  .products-grid { padding: 0 16px 40px; grid-template-columns: 1fr; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd-2); border-radius: 3px; }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="/">
    <div class="nav-logomark">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
    </div>
    <span class="nav-brand">Amal<em>Gus</em></span>
  </a>
  <div class="nav-divider"></div>
  <span class="nav-tag">Glass & Allied Products Marketplace</span>
  <div class="nav-right">
    <a class="nav-link" href="/">
      <i data-lucide="message-square"></i>
      Search
    </a>
    <a class="nav-link active" href="/products.html">
      <i data-lucide="grid-3x3"></i>
      Products
    </a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>All Products</h1>
  <p>Browse our complete catalog of 40+ verified glass and allied products from trusted Indian suppliers.</p>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-group">
    <i data-lucide="search"></i>
    <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()"/>
  </div>
  <div class="filter-group">
    <i data-lucide="layers"></i>
    <select id="catFilter" onchange="filterProducts()">
      <option value="">All categories</option>
    </select>
  </div>
  <div class="filter-group">
    <i data-lucide="indian-rupee"></i>
    <select id="priceFilter" onchange="filterProducts()">
      <option value="">Any price</option>
      <option value="500">Under 500</option>
      <option value="1000">Under 1,000</option>
      <option value="2000">Under 2,000</option>
      <option value="5000">Under 5,000</option>
      <option value="10000">Under 10,000</option>
    </select>
  </div>
  <div class="filter-group">
    <i data-lucide="ruler"></i>
    <select id="thickFilter" onchange="filterProducts()">
      <option value="">Any thickness</option>
      <option value="4">4 mm</option>
      <option value="5">5 mm</option>
      <option value="6">6 mm</option>
      <option value="8">8 mm</option>
      <option value="10">10 mm</option>
      <option value="12">12 mm</option>
    </select>
  </div>
  <div class="filter-group">
    <i data-lucide="arrow-up-down"></i>
    <select id="sortFilter" onchange="filterProducts()">
      <option value="name">Sort: Name</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
      <option value="category">Category</option>
    </select>
  </div>
  <div class="result-count" id="resultCount">
    <i data-lucide="package"></i>
    <span>Loading...</span>
  </div>
</div>

<!-- PRODUCTS GRID -->
<div class="products-grid" id="productsGrid">
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <span class="footer-text"><strong>AmalGus</strong></span>
    <div class="footer-sep"></div>
    <span class="footer-text">India's Glass & Allied Products Marketplace</span>
    <div class="footer-sep"></div>
    <span class="footer-text">TF-IDF vector search + Claude AI</span>
  </div>
</footer>

<script>
const API = 'http://localhost:3001/api';
let ALL_PRODUCTS = [];

addEventListener('DOMContentLoaded', async () => {
  lucide.createIcons();
  await loadProducts();
});

async function loadProducts() {
  try {
    ALL_PRODUCTS = await (await fetch(`${API}/products`)).json();
    populateCategories();
    filterProducts();
  } catch (err) {
    document.getElementById('productsGrid').innerHTML = `
      <div class="no-results">
        <i data-lucide="wifi-off"></i>
        <h3>Cannot connect to server</h3>
        <p>Make sure the backend is running: <code>node server.js</code></p>
      </div>`;
    lucide.createIcons();
  }
}

function populateCategories() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category))].sort();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
  });
}

function filterProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat    = document.getElementById('catFilter').value;
  const maxP   = document.getElementById('priceFilter').value;
  const thick  = document.getElementById('thickFilter').value;
  const sort   = document.getElementById('sortFilter').value;

  let filtered = ALL_PRODUCTS.filter(p => {
    if (cat && p.category !== cat) return false;
    if (maxP && p.price > +maxP) return false;
    if (thick && p.thickness !== +thick) return false;
    if (search) {
      const text = [p.name, p.category, p.supplier, p.description, p.color, p.coating, p.tags.join(' ')].join(' ').toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });

  // Sort
  if (sort === 'price-low') filtered.sort((a, b) => a.price - b.price);
  else if (sort === 'price-high') filtered.sort((a, b) => b.price - a.price);
  else if (sort === 'category') filtered.sort((a, b) => a.category.localeCompare(b.category));
  else filtered.sort((a, b) => a.name.localeCompare(b.name));

  renderGrid(filtered);
}

function renderGrid(products) {
  const grid = document.getElementById('productsGrid');
  const countEl = document.getElementById('resultCount');

  countEl.innerHTML = `<i data-lucide="package"></i><span>${products.length} product${products.length !== 1 ? 's' : ''}</span>`;

  if (!products.length) {
    grid.innerHTML = `
      <div class="no-results">
        <i data-lucide="search-x"></i>
        <h3>No products found</h3>
        <p>Try adjusting your filters or search term.</p>
      </div>`;
    lucide.createIcons();
    return;
  }

  grid.innerHTML = products.map(p => {
    const chips = [
      p.thickness ? `${p.thickness}mm` : null,
      p.color,
      p.edge,
    ].filter(Boolean);
    const chipIcons = ['ruler', 'palette', 'scissors'];

    return `
    <div class="p-card">
      <div class="p-card-header">
        <div class="p-card-cat">
          <i data-lucide="layers" style="width:12px;height:12px"></i>
          ${h(p.category)}
        </div>
        <div>
          <div class="p-card-price">${'\u20B9'}${(+p.price).toLocaleString('en-IN')}</div>
          <div class="p-card-price-unit">${h(p.priceUnit)}</div>
        </div>
      </div>
      <div class="p-card-body">
        <div class="p-card-name">${h(p.name)}</div>
        <div class="p-card-supplier">
          <i data-lucide="map-pin" style="width:12px;height:12px"></i>
          ${h(p.supplier)} &middot; ${h(p.location)}
        </div>
        <div class="p-card-desc">${h(p.description)}</div>
        <div class="p-card-chips">
          ${chips.map((c, i) => `
            <span class="p-chip">
              <i data-lucide="${chipIcons[i] || 'tag'}" style="width:10px;height:10px"></i>
              ${h(c)}
            </span>`).join('')}
          ${p.certification ? `<span class="p-chip"><i data-lucide="shield-check" style="width:10px;height:10px"></i> ${h(p.certification)}</span>` : ''}
        </div>
      </div>
      <div class="p-card-footer">
        <div class="p-card-meta">
          ${p.minOrder ? `<span class="p-meta-item"><i data-lucide="package"></i> ${h(p.minOrder)}</span>` : ''}
          ${p.leadTime ? `<span class="p-meta-item"><i data-lucide="clock"></i> ${h(p.leadTime)}</span>` : ''}
        </div>
        <button class="btn-view" onclick="window.location.href='/?q=${encodeURIComponent(p.name)}'">
          <i data-lucide="sparkles"></i> AI Match
        </button>
      </div>
    </div>`;
  }).join('');

  lucide.createIcons();
}

function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
